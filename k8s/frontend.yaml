apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ac-frontend:latest
          imagePullPolicy: Never        # использовать локальный образ
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: NodePort                        # доступен снаружи кластера
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080                   # открываем на порту 30080